<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Booth</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.header {
  padding: 10px;
  font-size: 20px;
  color: gold;
}

video {
  width: 100%;
  max-width: 420px;
  border-radius: 12px;
}

button {
  padding: 12px 16px;
  margin: 6px;
  border: none;
  border-radius: 10px;
  background: gold;
  font-weight: bold;
}

#countdown {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:80px;
  background:rgba(0,0,0,0.6);
  color:gold;
  z-index:999;
}

#preview {
  width: 80%;
  margin-top: 10px;
  border-radius: 12px;
  display: none;
}
</style>
</head>

<body>

<div class="header">
  Shafiqah ❤️ Faris Camera Booth
</div>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="switchCam()">🔄 Tukar Kamera</button>
<button onclick="capture()">📸 Capture</button>
<button onclick="upload()">☁️ Upload</button>

<div id="countdown"></div>

<img id="preview">

<canvas id="canvas" style="display:none;"></canvas>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzF1ohpnbkIFMy0AsnbdqRRv02-12c2Nf_jMRIk3kRgY1MwqvHAGXYygqvxbxccSdIOpg/exec";

let video = document.getElementById("video");
let useFront = true;
let stream;

let name = localStorage.getItem("name") || "guest";
let msg = localStorage.getItem("msg") || "";

async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: useFront ? "user" : "environment" }
  });

  video.srcObject = stream;
}

function switchCam() {
  useFront = !useFront;
  startCamera();
}

/* COUNTDOWN CAPTURE */
function capture() {
  let countdown = document.getElementById("countdown");
  let num = 3;

  countdown.style.display = "flex";
  countdown.innerText = num;

  let timer = setInterval(() => {
    num--;

    if (num > 0) {
      countdown.innerText = num;
    } else {
      clearInterval(timer);
      countdown.style.display = "none";

      let canvas = document.getElementById("canvas");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      let ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0);

      let preview = document.getElementById("preview");
      preview.src = canvas.toDataURL("image/jpeg");
      preview.style.display = "block";

      alert("📸 SNAP!");
    }
  }, 1000);
}

/* UPLOAD */
async function upload() {
  let canvas = document.getElementById("canvas");
  let image = canvas.toDataURL("image/jpeg").split(",")[1];

  let res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      name: name,
      message: msg,
      image: image
    })
  });

  let data = await res.json();

  if (data.success) {
    alert("❤️ Upload berjaya!");

    // reset
    document.getElementById("preview").style.display = "none";
  } else {
    alert("Error: " + data.error);
  }
}

startCamera();
</script>

</body>
</html>
