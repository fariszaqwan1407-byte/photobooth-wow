<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Booth</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

video{
  width:100%;
  max-width:420px;
  border-radius:16px;
  box-shadow:0 0 25px rgba(255,215,0,0.3);
}

button{
  padding:12px 16px;
  margin:6px;
  border:none;
  border-radius:12px;
  background:gold;
  font-weight:bold;
}

#countdown{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:90px;
  background:rgba(0,0,0,0.6);
  color:gold;
  z-index:999;
}

#preview{
  width:80%;
  margin-top:10px;
  border-radius:12px;
  display:none;
  border:2px solid gold;
}
</style>
</head>

<body>

<h3 style="color:gold;">Shafiqah ❤️ Faris Booth</h3>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="switchCam()">🔄 Tukar Kamera</button>
<button onclick="capture()">📸 Capture</button>
<button onclick="upload()">☁️ Upload</button>

<div id="countdown"></div>

<img id="preview">

<canvas id="canvas" style="display:none;"></canvas>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzF1ohpnbkIFMy0AsnbdqRRv02-12c2Nf_jMRIk3kRgY1MwqvHAGXYygqvxbxccSdIOpg/exec";

let video=document.getElementById("video");
let useFront=true;
let stream;

let name=localStorage.getItem("name")||"guest";
let msg=localStorage.getItem("msg")||"";

async function startCamera(){
  if(stream)stream.getTracks().forEach(t=>t.stop());

  stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:useFront?"user":"environment"}
  });

  video.srcObject=stream;
}

function switchCam(){
  useFront=!useFront;
  startCamera();
}

/* CAPTURE CLEAN (NO ALERT) */
function capture(){
  let countdown=document.getElementById("countdown");
  let num=3;

  countdown.style.display="flex";
  countdown.innerText=num;

  let timer=setInterval(()=>{
    num--;
    if(num>0){
      countdown.innerText=num;
    }else{
      clearInterval(timer);
      countdown.style.display="none";

      let canvas=document.getElementById("canvas");
      canvas.width=video.videoWidth;
      canvas.height=video.videoHeight;

      let ctx=canvas.getContext("2d");
      ctx.drawImage(video,0,0);

      let preview=document.getElementById("preview");
      preview.src=canvas.toDataURL("image/jpeg");
      preview.style.display="block";
    }
  },1000);
}

/* UPLOAD + GALLERY BUTTON AFTER */
async function upload(){
  let canvas=document.getElementById("canvas");
  let image=canvas.toDataURL("image/jpeg").split(",")[1];

  let audio=new Audio("https://www.soundjay.com/camera/sounds/camera-shutter-click-01.mp3");
  audio.play();

  let res=await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({name:name,message:msg,image:image})
  });

  let data=await res.json();

  if(data.success){

    document.body.innerHTML=`
      <div style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(135deg,#1a1a1a,#2b1b1b);color:gold;">
        <h1>❤️ Memory Saved</h1>
        <p>Shafiqah ❤️ Faris</p>

        <button onclick="goGallery()" style="padding:12px 18px;border:none;border-radius:12px;background:gold;font-weight:bold;margin-top:20px;">
          🖼️ View Gallery
        </button>
      </div>
    `;

    setTimeout(()=>{window.location.href="index.html";},5000);

  }else{
    alert("Error: "+data.error);
  }
}

function goGallery(){
  window.location.href="gallery.html";
}

startCamera();
</script>

</body>
</html>
