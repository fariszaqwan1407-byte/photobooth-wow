<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Gallery</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
h1 {
  text-align:center;
  color:gold;
  margin:15px;
}

/* BEST PIC */
.best {
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
}

.best img {
  width:250px;
  border-radius:12px;
  border:2px solid gold;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  border-radius:12px;
  overflow:hidden;
  border:1px solid gold;
  position:relative;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.name {
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.5);
  font-size:12px;
  text-align:center;
  padding:4px;
}
</style>
</head>

<body>

<h1>Shafiqah ❤️ Faris Gallery</h1>

<h3 style="padding-left:10px;color:gold;">⭐ Best Moments</h3>
<div class="best" id="best"></div>

<h3 style="padding-left:10px;color:gold;">🖼️ All Photos</h3>
<div class="grid" id="grid"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzF1ohpnbkIFMy0AsnbdqRRv02-12c2Nf_jMRIk3kRgY1MwqvHAGXYygqvxbxccSdIOpg/exec";

async function load() {
  let res = await fetch(API_URL + "?mode=gallery");
  let data = await res.json();

  let best = document.getElementById("best");
  let grid = document.getElementById("grid");

  best.innerHTML = "";
  grid.innerHTML = "";

  let files = data.files;

  // BEST PIC (ambil 3 latest)
  files.slice(0,3).forEach(f => {
    best.innerHTML += `<img src="${f.url}">`;
  });

  // ALL PHOTOS
  files.forEach(f => {
    grid.innerHTML += `
      <div class="card">
        <img src="${f.url}">
        <div class="name">${f.name}</div>
      </div>
    `;
  });
}

load();
setInterval(load, 5000);
</script>

</body>
</html>
