<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shafiqah ❤️ Faris - Guest Form</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1a1a1a, #2b1b1b);
  color: white;
  text-align: center;
}

.header h1 {
  margin-top: 30px;
  font-size: 28px;
  background: linear-gradient(90deg, gold, #fff);
  -webkit-background-clip: text;
  color: transparent;
}

input, textarea {
  width: 85%;
  padding: 12px;
  margin: 8px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 14px 20px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: gold;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <h1>Shafiqah ❤️ Faris</h1>
  <p>Wedding Photobomb</p>
</div>

<input id="name" placeholder="Nama anda">
<textarea id="msg" placeholder="Ucapan untuk pengantin"></textarea>

<br>

<button onclick="next()">📸 Terus ke Camera</button>

<script>
function next() {
  let name = document.getElementById("name").value;
  let msg = document.getElementById("msg").value;

  if (!name) {
    alert("Sila isi nama");
    return;
  }

  localStorage.setItem("name", name);
  localStorage.setItem("msg", msg);

  window.location.href = "camera.html";
}
</script>

</body>
</html>
