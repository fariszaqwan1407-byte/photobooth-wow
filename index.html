<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shafiqah ❤️ Faris</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#3a2b2b,#0f0f0f);
  color:white;
  text-align:center;
  overflow:hidden;
}

.particles::before {
  content:"✨ 🌸 ✨ 🌸 ✨ 🌸 ✨ 🌸";
  position:fixed;
  top:-20px;
  width:100%;
  opacity:0.2;
  animation:fall 12s linear infinite;
}

@keyframes fall {
  from{transform:translateY(-100px);}
  to{transform:translateY(100vh);}
}

.card {
  margin-top:70px;
  background:rgba(255,255,255,0.08);
  padding:22px;
  border-radius:20px;
  width:85%;
  margin-left:auto;
  margin-right:auto;
  backdrop-filter:blur(10px);
}

input,textarea{
  width:90%;
  padding:12px;
  margin:8px;
  border:none;
  border-radius:10px;
}

button{
  padding:14px 18px;
  border:none;
  border-radius:12px;
  background:gold;
  font-weight:bold;
}
h1{
  background:linear-gradient(90deg,gold,#fff);
  -webkit-background-clip:text;
  color:transparent;
}
</style>
</head>

<body>

<div class="particles"></div>

<div class="card">
  <h1>Shafiqah ❤️ Faris</h1>
  <p>Wedding Photobooth Experience</p>

  <input id="name" placeholder="Nama anda">
  <textarea id="msg" placeholder="Ucapan"></textarea>

  <button onclick="next()">📸 Continue</button>
</div>

<script>
function next(){
  let name=document.getElementById("name").value;
  let msg=document.getElementById("msg").value;

  if(!name){alert("Sila isi nama");return;}

  localStorage.setItem("name",name);
  localStorage.setItem("msg",msg);

  window.location.href="camera.html";
}
</script>

</body>
</html>
