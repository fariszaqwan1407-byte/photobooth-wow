<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shafiqah ❤️ Faris</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#2b1b1b,#0b0b0b);
  overflow:hidden;
  color:white;
}

/* floating glow */
.glow{
  position:absolute;
  width:300px;
  height:300px;
  background:gold;
  filter:blur(120px);
  opacity:0.15;
  animation:move 8s infinite alternate;
}

@keyframes move{
  from{transform:translate(0,0);}
  to{transform:translate(200px,300px);}
}

/* card */
.card{
  position:relative;
  width:85%;
  margin:120px auto;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  box-shadow:0 0 25px rgba(255,215,0,0.2);
  text-align:center;
}

/* title */
h1{
  font-size:28px;
  background:linear-gradient(90deg,gold,#fff,#ffd700);
  -webkit-background-clip:text;
  color:transparent;
  animation:shine 3s infinite linear;
}

@keyframes shine{
  0%{filter:brightness(1);}
  50%{filter:brightness(1.4);}
  100%{filter:brightness(1);}
}

input,textarea{
  width:90%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  outline:none;
}

button{
  padding:14px 18px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,gold,#ffcc00);
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 15px rgba(255,215,0,0.3);
}

.small{
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="card">
  <h1>Shafiqah ❤️ Faris</h1>
  <p class="small">Wedding Photobooth Experience</p>

  <input id="name" placeholder="Nama anda">
  <textarea id="msg" placeholder="Ucapan untuk pengantin"></textarea>

  <button onclick="next()">📸 Enter Booth</button>
</div>

<script>
function next(){
  let name=document.getElementById("name").value;
  let msg=document.getElementById("msg").value;

  if(!name){alert("Sila isi nama");return;}

  localStorage.setItem("name",name);
  localStorage.setItem("msg",msg);

  window.location.href="camera.html";
}
</script>

</body>
</html>
