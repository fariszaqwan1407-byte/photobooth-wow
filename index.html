<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wedding Photobooth</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(180deg,#111,#000);
      color:white;
      text-align:center;
      padding:20px;
    }

    h1{
      color:gold;
      margin-bottom:10px;
    }

    video{
      width:90%;
      max-width:420px;
      border-radius:18px;
      box-shadow:0 0 25px rgba(255,215,0,0.3);
    }

    img{
      max-width:300px;
      width:90%;
      border-radius:15px;
      margin-top:10px;
      border:2px solid gold;
      display:none;
    }

    button{
      margin:8px;
      padding:12px 16px;
      border:none;
      border-radius:12px;
      background:linear-gradient(90deg,gold,#ffcc00);
      font-weight:bold;
      cursor:pointer;
    }

    #gallery{
      margin-top:25px;
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
    }

    #gallery img{
      width:110px;
      border-radius:10px;
      border:2px solid rgba(255,215,0,0.4);
    }

    .box{
      margin-top:10px;
    }
  </style>
</head>

<body>

<h1>💍 Wedding Photobooth</h1>

<!-- CAMERA -->
<video id="video" autoplay playsinline></video>

<canvas id="canvas" style="display:none;"></canvas>

<!-- PREVIEW -->
<img id="preview">

<div class="box">
  <button onclick="capture()">📸 Capture</button>
  <button onclick="upload()">🚀 Upload</button>
</div>

<!-- GALLERY -->
<h3>📸 Gallery</h3>
<div id="gallery"></div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const preview = document.getElementById("preview");

let currentImage = "";

/* ======================
   START CAMERA
====================== */
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  alert("Camera error: " + err);
});

/* ======================
   CAPTURE IMAGE
====================== */
function capture(){
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  currentImage = canvas.toDataURL("image/jpeg",0.9);

  preview.src = currentImage;
  preview.style.display = "block";
}

/* ======================
   UPLOAD TO GOOGLE SCRIPT
====================== */
function upload(){

  if(!currentImage){
    alert("Sila capture dulu");
    return;
  }

  fetch("PASTE_YOUR_GOOGLE_SCRIPT_URL", {
    method:"POST",
    body: JSON.stringify({
      image: currentImage
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.success){
      addToGallery(data.url);
      alert("Upload berjaya 💍");

      preview.style.display = "none";
      currentImage = "";
    } else {
      alert("Error: " + data.error);
    }
  })
  .catch(err => alert("Network error"));
}

/* ======================
   ADD TO GALLERY
====================== */
function addToGallery(url){
  const gallery = document.getElementById("gallery");

  const img = document.createElement("img");
  img.src = url;

  gallery.prepend(img);
}
</script>

</body>
</html>
