<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shafiqah ❤️ Faris Photobomb</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1a1a1a, #2b1b1b);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* HEADER */
.header h1 {
  font-size: 28px;
  background: linear-gradient(90deg, gold, #fff);
  -webkit-background-clip: text;
  color: transparent;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px gold; }
  to { text-shadow: 0 0 20px gold; }
}

/* SPARKLES */
.sparkles::before {
  content: "✨ 🌸 ✨ 🌸 ✨ 🌸 ✨ 🌸";
  position: fixed;
  top: -20px;
  width: 100%;
  opacity: 0.25;
  animation: fall 10s linear infinite;
}

@keyframes fall {
  from { transform: translateY(-100px); }
  to { transform: translateY(100vh); }
}

/* CAMERA FRAME */
.frame {
  border: 3px solid gold;
  border-radius: 16px;
  padding: 6px;
  display: inline-block;
  box-shadow: 0 0 20px rgba(255,215,0,0.3);
  margin-top: 10px;
}

/* INPUT */
input, textarea {
  width: 90%;
  padding: 10px;
  margin: 6px;
  border-radius: 8px;
  border: none;
}

/* BUTTON */
button {
  padding: 14px 18px;
  margin: 6px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, gold, #ffd700);
  color: black;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(255,215,0,0.4);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px gold;
}

video {
  width: 100%;
  max-width: 420px;
  border-radius: 12px;
}

/* COUNTDOWN OVERLAY */
#countdown {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 90px;
  background: rgba(0,0,0,0.6);
  color: gold;
  z-index: 999;
}

/* PREVIEW */
#preview {
  width: 90%;
  max-width: 300px;
  margin-top: 10px;
  border-radius: 12px;
  border: 2px solid gold;
  display: none;
}
</style>
</head>

<body>

<div class="sparkles"></div>

<div class="header">
  <h1>Shafiqah ❤️ Faris</h1>
  <p>Wedding Photobomb Experience</p>
</div>

<input id="name" placeholder="Nama anda">
<textarea id="msg" placeholder="Ucapan"></textarea>

<div class="frame">
  <video id="video" autoplay playsinline></video>
</div>

<br>

<button onclick="switchCam()">🔄 Tukar Kamera</button>
<button onclick="capture()">📸 Ambil Gambar</button>
<button onclick="upload()">☁️ Upload</button>

<div id="countdown"></div>

<img id="preview">

<canvas id="canvas" style="display:none;"></canvas>

<script>
let video = document.getElementById("video");
let useFront = true;
let stream;

const API_URL = "https://script.google.com/macros/s/AKfycbzF1ohpnbkIFMy0AsnbdqRRv02-12c2Nf_jMRIk3kRgY1MwqvHAGXYygqvxbxccSdIOpg/exec";

/* CAMERA */
async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: useFront ? "user" : "environment" }
  });

  video.srcObject = stream;
}

function switchCam() {
  useFront = !useFront;
  startCamera();
}

/* COUNTDOWN + CAPTURE */
function capture() {
  let countdown = document.getElementById("countdown");
  let num = 3;

  countdown.style.display = "flex";
  countdown.innerText = num;

  let timer = setInterval(() => {
    num--;

    if (num > 0) {
      countdown.innerText = num;
    } else {
      clearInterval(timer);
      countdown.style.display = "none";

      let canvas = document.getElementById("canvas");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      let ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0);

      // flash effect
      document.body.style.opacity = "0.3";
      setTimeout(() => document.body.style.opacity = "1", 150);

      // preview
      let preview = document.getElementById("preview");
      preview.src = canvas.toDataURL("image/jpeg");
      preview.style.display = "block";

      alert("📸 SNAP!");
    }
  }, 1000);
}

/* UPLOAD */
async function upload() {
  let canvas = document.getElementById("canvas");
  let image = canvas.toDataURL("image/jpeg").split(",")[1];
  let name = document.getElementById("name").value || "guest";

  let res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      name: name,
      image: image
    })
  });

  let data = await res.json();

  if (data.success) {
    alert("❤️ Terima kasih! Gambar anda disimpan ❤️");

    // reset
    document.getElementById("name").value = "";
    document.getElementById("msg").value = "";
    document.getElementById("preview").style.display = "none";

  } else {
    alert("Upload gagal: " + data.error);
  }
}

startCamera();
</script>

</body>
</html>
